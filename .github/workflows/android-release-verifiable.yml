name: Android Release + Checksum

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build Android Release And Publish Checksum
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare Android signing
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          for secret_name in \
            ANDROID_UPLOAD_KEYSTORE_BASE64 \
            ANDROID_UPLOAD_STORE_PASSWORD \
            ANDROID_UPLOAD_KEY_ALIAS \
            ANDROID_UPLOAD_KEY_PASSWORD
          do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              exit 1
            fi
          done

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path('android/app/upload-keystore.jks').write_bytes(
            base64.b64decode(os.environ['ANDROID_UPLOAD_KEYSTORE_BASE64'])
          )
          PY

          cat > android/keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_UPLOAD_STORE_PASSWORD}
          keyAlias=${ANDROID_UPLOAD_KEY_ALIAS}
          keyPassword=${ANDROID_UPLOAD_KEY_PASSWORD}
          EOF

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Android release APK
        run: npm run build:android:release

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          node scripts/hash-android-release.js | tee SHA256SUMS.txt

      - name: Prepare distribution files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -v android/app/build/outputs/apk/release/*.apk dist/
          cp -v SHA256SUMS.txt dist/

      - name: Upload artifact (APK + checksum)
        uses: actions/upload-artifact@v4
        with:
          name: android-release-with-checksum
          path: |
            dist/*.apk
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish release assets (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.apk
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Add checksum summary
        shell: bash
        run: |
          {
            echo '## Android Release SHA-256'
            echo
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup signing files
        if: always()
        shell: bash
        run: rm -f android/keystore.properties android/app/upload-keystore.jks
